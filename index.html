<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emma Glow | Skincare AI</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'emma': {
              'pink': '#fdf2f2',   // Fondo rosa muy suave
              'accent': '#db2777', // Fucsia para botones y títulos
              'gold': '#c9af5d',   // Dorado para detalles premium
              'dark': '#1f2937',   // Gris casi negro para textos legibles
              'rose': '#fb7185',   // Rosa intermedio
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #fdf2f2; margin: 0; }
  </style>
</head>
<body>
  <div id="root">
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #db2777;">
      <h2>Cargando Emma Glow...</h2>
    </div>
  </div>

  <script type="module">
    import { createRoot } from 'https://esm.sh/react-dom/client';
    import React from 'https://esm.sh/react';
    
    // Conexión directa a tu archivo de lógica
    import App from 'https://esm.sh/gh/valentinapinedag0927-creator/emma-glow2/App.tsx';

    const root = createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
