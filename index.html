<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emma Glow</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'serif': ['Playfair Display', 'serif'],
            'sans': ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    /* ESTO ARREGLA EL LOGO VERTICAL */
    .font-serif { 
      font-family: 'Playfair Display', serif !important;
      white-space: nowrap !important; /* Prohibido ponerse vertical */
      display: inline-block !important;
    }
    
    /* Colores de fondo originales */
    body { 
      background: #fdf2f2 !important; 
      margin: 0;
    }

    /* Arreglo para que las tarjetas se vean bien */
    .glass-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import { createRoot } from 'https://esm.sh/react-dom/client';
    import React from 'https://esm.sh/react';
    
    // Este import carga tu App.tsx y lo traduce al instante
    import App from 'https://esm.sh/gh/valentinapinedag0927-creator/emma-glow2/App.tsx?bundle';

    const root = createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
