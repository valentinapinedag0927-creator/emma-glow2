<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emma Glow</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['Playfair Display', 'serif'],
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            'emma-pink': '#db2777',
            'emma-light': '#fdf2f2',
          }
        }
      }
    }
  </script>
  <style>
    /* Esto evita que el logo se rompa y se ponga vertical */
    .logo-container { white-space: nowrap; min-width: fit-content; }
    body { background-color: #fdf2f2; margin: 0; font-family: 'Inter', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import { createRoot } from 'https://esm.sh/react-dom/client';
    import React from 'https://esm.sh/react';
    // Usamos el cargador de esm.sh para que entienda tu App.tsx
    import App from 'https://esm.sh/gh/valentinapinedag0927-creator/emma-glow2/App.tsx?bundle';

    const root = createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
