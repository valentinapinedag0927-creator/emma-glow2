<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emma Glow</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-pink-50">
    <div id="root">
      <h1 style="text-align: center; margin-top: 50px; color: #db2777;">Cargando Emma Glow...</h1>
    </div>
<script type="module">
  import { createRoot } from 'https://esm.sh/react-dom/client';
  import React from 'https://esm.sh/react';

  // Intentamos forzar un mensaje directo en pantalla
  const root = createRoot(document.getElementById('root'));
  root.render(React.createElement('h1', { 
    style: { 
      color: '#db2777', 
      textAlign: 'center', 
      marginTop: '50px',
      fontFamily: 'sans-serif' 
    } 
  }, '¡React está vivo! Ahora intentaremos cargar el escáner...'));
</script>
  </body>
</html>
